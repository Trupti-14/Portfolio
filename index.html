<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#12110f">
  <meta
    name="description"
    content="Trupti Patil is a Computer Engineering student building backend, full-stack, cybersecurity, and AI products with Java, Spring Boot, React, Python, and FastAPI."
  >
  <meta property="og:title" content="Trupti Patil | Software Engineering Portfolio">
  <meta
    property="og:description"
    content="Backend, full-stack, cybersecurity, and AI projects by Trupti Patil, a Computer Engineering student seeking software engineering internships."
  >
  <meta property="og:type" content="website">
  <title>Trupti Patil | Software Engineering Portfolio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Manrope:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="style.css?v=7">
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>

  <div class="blob blob-1" aria-hidden="true"></div>
  <div class="blob blob-2" aria-hidden="true"></div>

  <nav id="navbar" aria-label="Primary navigation">
    <div class="nav-inner">
      <a class="nav-logo" id="nav-logo" href="#hero" aria-label="Portfolio home">Trupti Patil</a>

      <button
        class="hamburger"
        id="hamburger"
        type="button"
        aria-label="Open navigation menu"
        aria-expanded="false"
        aria-controls="nav-links"
      >
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
      </button>

      <ul class="nav-links" id="nav-links">
        <li><a href="#hero">Home</a></li>
        <li><a href="#projects">Projects</a></li>
        <li><a href="#skills">Skills</a></li>
        <li><a href="#education">Education</a></li>
        <li><a href="#achievements">Achievements</a></li>
        <li><a href="#contact">Contact</a></li>
        <li id="nav-resume-item"></li>
        <li id="nav-admin-item" hidden>
          <a
            class="nav-control"
            href="admin.html"
            aria-label="Open portfolio administration"
          >
            Control
          </a>
        </li>
      </ul>
    </div>
  </nav>

  <main id="main-content">
    <section id="hero" class="hero-section">
      <div class="container">
        <div class="hero-grid">
          <div class="hero-content" id="hero-content"></div>
          <aside class="profile-card" id="profile-card" aria-label="Engineering profile summary"></aside>
        </div>
        <div class="proof-strip" id="proof-strip" aria-label="Profile highlights"></div>
      </div>
    </section>

    <section id="currently-building">
      <div class="container">
        <div class="section-heading reveal" id="currently-building-heading"></div>
        <div class="building-grid reveal-stagger" id="currently-building-grid"></div>
      </div>
    </section>

    <section id="quote" class="quote-section">
      <div class="container">
        <figure class="motivation-quote reveal" id="motivation-quote"></figure>
      </div>
    </section>

    <section id="projects">
      <div class="container">
        <div class="section-heading reveal" id="projects-heading"></div>
        <div class="projects-grid reveal-stagger" id="projects-grid"></div>
      </div>
    </section>

    <section id="skills">
      <div class="container">
        <div class="section-heading reveal" id="skills-heading"></div>
        <div class="skills-grid reveal-stagger" id="skills-grid"></div>
      </div>
    </section>

    <section id="coding-profiles">
      <div class="container">
        <div class="coding-profiles-shell reveal">
          <div class="coding-profiles-heading" id="coding-profiles-heading"></div>
          <div class="coding-profiles-list" id="coding-profiles-list"></div>
        </div>
      </div>
    </section>

    <section id="education">
      <div class="container">
        <div class="education-grid" id="education-grid"></div>
      </div>
    </section>

    <section id="achievements">
      <div class="container">
        <div class="section-heading reveal" id="achievements-heading"></div>
        <div id="achievement-groups"></div>
      </div>
    </section>

    <section id="certifications">
      <div class="container">
        <div class="section-heading reveal" id="certifications-heading"></div>
        <div class="cert-grid reveal-stagger" id="certifications-grid"></div>
      </div>
    </section>

    <section id="gallery">
      <div class="container">
        <div class="section-heading reveal" id="gallery-heading"></div>
        <div class="gallery-grid reveal-stagger" id="gallery-grid"></div>
      </div>
    </section>

    <section id="contact">
      <div class="container">
        <div class="contact-card reveal" id="contact-card"></div>
      </div>
    </section>
  </main>

  <footer>
    <div class="container footer-inner" id="footer-content"></div>
  </footer>

  <noscript>
    <div class="noscript-message">
      This portfolio needs JavaScript enabled to display its project and achievement data.
    </div>
  </noscript>

  <script src="portfolio-data.js"></script>
  <script src="supabase-config.js"></script>
  <script src="supabase-client.js"></script>
  <script src="portfolio-service.js?v=2"></script>
  <script src="script.js?v=9"></script>
  <script src="analytics.js"></script>
</body>
</html>
